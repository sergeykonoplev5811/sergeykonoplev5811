name: Metrics action
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.achievements.compact.svg
          user: sergeykonoplev5811
          base: metadata
          output_action: gist
          plugin_achievements: yes
          plugin_achievements_only: polyglot, developer, member, deployer, contributor, influencer, helper, follower, stargazer, maintainer, chatter, inspirer, automator, infographile
          plugin_achievements_display: compact
          plugin_achievements_threshold: X


      - name: Detailed display
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: sergeykonoplev5811
          base: metadata
          plugin_achievements: yes
          plugin_achievements_only: polyglot, developer, deployer, automator



          

  delete-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 5
          keep_minimum_runs: 5